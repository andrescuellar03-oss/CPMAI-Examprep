<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPMAI Quick Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--border:#2e3345;
    --text:#e2e4ed;--text2:#9398a8;--accent:#6c63ff;--accent2:#8b83ff;
    --green:#22c55e;--green-bg:rgba(34,197,94,.12);--green-border:rgba(34,197,94,.3);
    --red:#ef4444;--red-bg:rgba(239,68,68,.10);--red-border:rgba(239,68,68,.3);
    --amber:#f59e0b;--amber-bg:rgba(245,158,11,.10);
    --radius:10px;
  }
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
    display:flex;flex-direction:column;line-height:1.5;
  }

  /* ===== TOP BAR ===== */
  .topbar{
    display:flex;align-items:center;gap:1rem;padding:.5rem 1.25rem;
    background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .topbar h1{font-size:1rem;font-weight:800;letter-spacing:-.01em;
    background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;
    -webkit-text-fill-color:transparent;white-space:nowrap}
  .progress-wrap{flex:1;background:var(--surface2);border-radius:99px;height:6px;overflow:hidden}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#a78bfa);border-radius:99px;transition:width .4s ease}
  .stats{display:flex;gap:.75rem;align-items:center}
  .stat{font-size:.75rem;color:var(--text2);font-weight:600}
  .stat span{font-weight:800;font-size:.85rem}
  .stat .g{color:var(--green)}
  .stat .r{color:var(--red)}

  /* ===== MAIN TWO-COLUMN LAYOUT ===== */
  .quiz-layout{
    display:flex;flex:1;overflow:hidden;
  }
  .left-panel{
    flex:1;min-width:0;display:flex;flex-direction:column;
    padding:1rem 1.25rem;overflow-y:auto;
  }
  .right-panel{
    width:360px;flex-shrink:0;display:flex;flex-direction:column;
    border-left:1px solid var(--border);background:var(--surface);
    overflow-y:auto;
  }

  /* ===== DOMAIN + DIFFICULTY BADGES ===== */
  .badge-row{margin-bottom:.4rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
  .domain{display:inline-block;font-size:.6rem;font-weight:600;text-transform:uppercase;
    letter-spacing:.05em;color:var(--accent2);background:rgba(108,99,255,.12);
    padding:.2rem .55rem;border-radius:99px}
  .difficulty{display:inline-block;font-size:.58rem;font-weight:600;text-transform:uppercase;
    letter-spacing:.05em;padding:.18rem .5rem;border-radius:99px}
  .difficulty.easy{color:var(--green);background:var(--green-bg)}
  .difficulty.medium{color:var(--amber);background:var(--amber-bg)}
  .difficulty.hard{color:var(--red);background:var(--red-bg)}

  /* ===== QUESTION ===== */
  .q-number{font-size:.7rem;color:var(--text2);margin-bottom:.35rem;font-weight:600}
  .q-text{font-size:.9rem;font-weight:600;margin-bottom:.85rem;line-height:1.5}

  /* ===== OPTIONS ===== */
  .options{display:flex;flex-direction:column;gap:.45rem}
  .opt-btn{
    width:100%;text-align:left;background:var(--surface2);border:1.5px solid var(--border);
    border-radius:var(--radius);padding:.55rem .75rem;font-size:.8rem;color:var(--text);
    cursor:pointer;transition:all .15s ease;font-family:inherit;line-height:1.45;
  }
  .opt-btn:hover:not(.locked){border-color:var(--accent);background:rgba(108,99,255,.08)}
  .opt-btn.locked{cursor:default}
  .opt-btn.correct-pick{border-color:var(--green);background:var(--green-bg)}
  .opt-btn.wrong-pick{border-color:var(--red);background:var(--red-bg)}
  .opt-btn.reveal-correct{border-color:var(--green);background:var(--green-bg)}

  /* ===== NEXT BUTTON (under options) ===== */
  .next-row{margin-top:.75rem;display:flex;justify-content:flex-end}
  .btn{
    padding:.5rem 1.3rem;border-radius:var(--radius);border:none;font-family:inherit;
    font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s ease;
  }
  .btn-primary{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(108,99,255,.35)}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn-secondary:hover{border-color:var(--accent)}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

  /* ===== RIGHT PANEL: FEEDBACK ===== */
  .feedback-header{
    padding:.65rem 1rem;border-bottom:1px solid var(--border);
    font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);
  }
  .feedback-body{
    flex:1;padding:1rem;overflow-y:auto;display:flex;flex-direction:column;
  }
  .fb-placeholder{
    flex:1;display:flex;align-items:center;justify-content:center;
    color:var(--text2);font-size:.85rem;text-align:center;padding:1rem;opacity:.5;
  }
  .fb-content{display:none;animation:fadeIn .3s ease}
  .fb-content.show{display:block}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  .fb-verdict{
    padding:.65rem .85rem;border-radius:var(--radius);margin-bottom:.75rem;
    font-weight:700;font-size:.85rem;
  }
  .fb-verdict.is-correct{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green)}
  .fb-verdict.is-wrong{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}

  .fb-section{margin-bottom:.65rem}
  .fb-section .fb-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);margin-bottom:.2rem}
  .fb-section p{font-size:.8rem;line-height:1.55;color:var(--text)}
  .fb-section .correct-ans{color:var(--green);font-weight:600;font-size:.8rem}

  .fb-concept{
    margin-top:auto;padding:.65rem;background:rgba(108,99,255,.08);border-radius:8px;
    border:1px solid rgba(108,99,255,.18);font-size:.75rem;color:var(--accent2);line-height:1.5;
  }

  /* ===== START / RESULTS SCREENS ===== */
  .overlay-screen{
    position:fixed;inset:0;background:var(--bg);z-index:100;
    display:flex;align-items:center;justify-content:center;
  }
  .overlay-screen.hidden{display:none}
  .overlay-inner{text-align:center;max-width:480px;padding:2rem;animation:fadeIn .35s ease}
  .overlay-inner h2{font-size:1.5rem;font-weight:800;margin-bottom:.4rem}
  .overlay-inner p{color:var(--text2);margin-bottom:1.5rem;font-size:.9rem}
  .overlay-inner h1{font-size:1.75rem;font-weight:800;
    background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;
    -webkit-text-fill-color:transparent;margin-bottom:.75rem}
  .q-count-row{display:flex;align-items:center;justify-content:center;gap:.75rem;margin-bottom:1.5rem}
  .q-count-row label{font-size:.85rem;color:var(--text2)}
  .q-count-row select{
    background:var(--surface2);color:var(--text);border:1px solid var(--border);
    border-radius:8px;padding:.4rem .7rem;font-family:inherit;font-size:.85rem;
  }

  /* results */
  .score-big{
    font-size:3.5rem;font-weight:800;
    background:linear-gradient(135deg,var(--accent),#a78bfa);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:.35rem 0;
  }
  .btn-row{display:flex;gap:.65rem;justify-content:center;margin:.75rem 0 1.5rem}

  /* results review list (scrollable) */
  .results-review{
    max-height:40vh;overflow-y:auto;text-align:left;padding-right:.5rem;
  }
  .review-item{
    background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:.75rem .85rem;margin-bottom:.6rem;
  }
  .review-item .ri-q{font-weight:600;font-size:.8rem;margin-bottom:.25rem}
  .review-item .ri-your{font-size:.75rem;margin-bottom:.15rem}
  .review-item .ri-wrong-ans{color:var(--red)}
  .review-item .ri-right-ans{color:var(--green);font-weight:500;font-size:.75rem}
  .review-item .ri-explain{font-size:.72rem;color:var(--text2);margin-top:.25rem;line-height:1.45}

  /* ===== KEYBOARD HINT ===== */
  .kb-hint{font-size:.65rem;color:var(--text2);opacity:.4;text-align:center;margin-top:.4rem}
</style>
</head>
<body>

<!-- ===== START SCREEN OVERLAY ===== -->
<div id="startScreen" class="overlay-screen">
  <div class="overlay-inner">
    <h1>⚡ CPMAI Quick Practice</h1>
    <h2>Ready to practice?</h2>
    <p>Random questions from your 279-question bank.<br>Instant feedback after every answer.</p>
    <div class="q-count-row">
      <label for="qCount">Questions:</label>
      <select id="qCount">
        <option value="10">10</option>
        <option value="20" selected>20</option>
        <option value="30">30</option>
        <option value="50">50</option>
        <option value="0">All (279)</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()" style="padding:.65rem 2rem;font-size:.95rem">Start Quiz →</button>
  </div>
</div>

<!-- ===== RESULTS SCREEN OVERLAY ===== -->
<div id="resultsScreen" class="overlay-screen hidden"></div>

<!-- ===== TOP BAR ===== -->
<div class="topbar" id="topbar" style="display:none">
  <h1>⚡ CPMAI</h1>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="stats">
    <div class="stat"><span id="statQ">1/20</span></div>
    <div class="stat">✓ <span class="g" id="statCorrect">0</span></div>
    <div class="stat">✗ <span class="r" id="statWrong">0</span></div>
  </div>
</div>

<!-- ===== QUIZ TWO-COLUMN LAYOUT ===== -->
<div class="quiz-layout" id="quizLayout" style="display:none">
  <!-- LEFT: question + options -->
  <div class="left-panel" id="leftPanel"></div>

  <!-- RIGHT: feedback -->
  <div class="right-panel">
    <div class="feedback-header">Feedback</div>
    <div class="feedback-body" id="feedbackBody">
      <div class="fb-placeholder" id="fbPlaceholder">
        Pick an answer to see feedback
      </div>
      <div class="fb-content" id="fbContent"></div>
    </div>
  </div>
</div>

<script>
let ALL_QUESTIONS = [];
let quiz = [];
let current = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;
let history = [];

async function loadData(){
  try {
    const res = await fetch('./data/questions.json');
    if(!res.ok) throw new Error('fetch failed');
    ALL_QUESTIONS = await res.json();
  } catch(e) {
    console.error('Could not load questions.json', e);
  }
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}

function startQuiz(){
  const n = parseInt(document.getElementById('qCount').value);
  const count = n === 0 ? ALL_QUESTIONS.length : n;
  quiz = shuffle(ALL_QUESTIONS).slice(0, count);
  current = 0; correctCount = 0; wrongCount = 0; answered = false; history = [];

  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('resultsScreen').classList.add('hidden');
  document.getElementById('topbar').style.display='flex';
  document.getElementById('quizLayout').style.display='flex';
  renderQuestion();
}

function renderQuestion(){
  answered = false;

  const q = quiz[current];
  const total = quiz.length;
  const pct = ((current) / total * 100).toFixed(0);

  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('statQ').textContent = `${current+1}/${total}`;
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;

  // Reset feedback panel
  document.getElementById('fbPlaceholder').style.display = 'flex';
  document.getElementById('fbContent').classList.remove('show');
  document.getElementById('fbContent').innerHTML = '';

  const diffClass = (q.difficulty || 'medium').toLowerCase();

  let html = `
    <div class="badge-row">
      <span class="domain">${esc(q.domain)}</span>
      <span class="difficulty ${diffClass}">${diffClass}</span>
    </div>
    <div class="q-number">Question ${current+1} of ${total}</div>
    <div class="q-text">${esc(q.question)}</div>
    <div class="options" id="optionsWrap">`;

  q.options.forEach((opt, i) => {
    html += `<button class="opt-btn" data-idx="${i}" onclick="pickAnswer(${i})">${esc(opt)}</button>`;
  });

  html += `</div>
    <div class="next-row">
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>Next →</button>
    </div>
    <div class="kb-hint">Keys: 1-4 answer · Enter next</div>`;

  document.getElementById('leftPanel').innerHTML = html;
}

function pickAnswer(idx){
  if(answered) return;
  answered = true;

  const q = quiz[current];
  const picked = q.options[idx];
  const isCorrect = picked === q.correct_answer;

  if(isCorrect) correctCount++; else wrongCount++;
  history.push({q, picked, wasCorrect: isCorrect});

  // Lock + highlight options
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.classList.add('locked'));
  const correctIdx = q.options.indexOf(q.correct_answer);
  btns.forEach((b, i) => {
    if(i === idx && isCorrect) b.classList.add('correct-pick');
    if(i === idx && !isCorrect) b.classList.add('wrong-pick');
    if(i === correctIdx && !isCorrect) b.classList.add('reveal-correct');
  });

  // Update stats
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;

  // Build feedback in right panel
  document.getElementById('fbPlaceholder').style.display = 'none';
  const fb = document.getElementById('fbContent');

  let fhtml = '';
  if(isCorrect){
    fhtml += `<div class="fb-verdict is-correct">✅ Correct!</div>`;
    fhtml += `<div class="fb-section"><div class="fb-label">Why it's right</div><p>${esc(q.correct_explanation)}</p></div>`;
  } else {
    fhtml += `<div class="fb-verdict is-wrong">❌ Incorrect</div>`;
    fhtml += `<div class="fb-section"><div class="fb-label">Why your answer is wrong</div><p>${esc(q.wrong_explanation)}</p></div>`;
    fhtml += `<div class="fb-section"><div class="fb-label">Correct answer</div><p class="correct-ans">${esc(q.correct_answer)}</p></div>`;
    fhtml += `<div class="fb-section"><div class="fb-label">Why it's correct</div><p>${esc(q.correct_explanation)}</p></div>`;
  }
  if(q.key_concept){
    fhtml += `<div class="fb-concept">💡 <strong>Key Concept:</strong> ${esc(q.key_concept)}</div>`;
  }
  fb.innerHTML = fhtml;
  fb.classList.add('show');

  // Enable next
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = current < quiz.length - 1 ? 'Next →' : 'See Results';
  nextBtn.disabled = false;
}

function nextQuestion(){
  if(current < quiz.length - 1){
    current++;
    renderQuestion();
  } else {
    showResults();
  }
}

function showResults(){
  document.getElementById('topbar').style.display='none';
  document.getElementById('quizLayout').style.display='none';

  const total = quiz.length;
  const pct = Math.round((correctCount/total)*100);

  let grade = '';
  if(pct >= 90) grade = '🏆 Outstanding!';
  else if(pct >= 75) grade = '👏 Great job!';
  else if(pct >= 60) grade = '📖 Keep studying!';
  else grade = '💪 Needs more practice';

  let html = `<div class="overlay-inner" style="max-width:600px">
    <h2>Quiz Complete</h2>
    <div class="score-big">${pct}%</div>
    <p>${correctCount} correct out of ${total} — ${grade}</p>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="startQuiz()">🔄 New Quiz</button>
      <button class="btn btn-secondary" onclick="goHome()">← Home</button>
    </div>`;

  const wrongs = history.filter(h => !h.wasCorrect);
  if(wrongs.length === 0){
    html += `<p style="color:var(--green);font-weight:600">🎯 Perfect score!</p>`;
  } else {
    html += `<h3 style="text-align:left;margin-bottom:.5rem;font-size:.9rem;font-weight:700">Review Wrong Answers (${wrongs.length})</h3>
      <div class="results-review">`;
    wrongs.forEach((h,i) => {
      html += `<div class="review-item">
        <div class="ri-q">${i+1}. ${esc(h.q.question)}</div>
        <div class="ri-your ri-wrong-ans">✗ ${esc(h.picked)}</div>
        <div class="ri-right-ans">✓ ${esc(h.q.correct_answer)}</div>
        <div class="ri-explain"><strong>Why:</strong> ${esc(h.q.wrong_explanation)}</div>
        <div class="ri-explain"><strong>Correct:</strong> ${esc(h.q.correct_explanation)}</div>
        ${h.q.key_concept ? `<div class="ri-explain" style="color:var(--accent2)">💡 ${esc(h.q.key_concept)}</div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  const rs = document.getElementById('resultsScreen');
  rs.innerHTML = html;
  rs.classList.remove('hidden');
}

function goHome(){
  document.getElementById('resultsScreen').classList.add('hidden');
  document.getElementById('topbar').style.display='none';
  document.getElementById('quizLayout').style.display='none';
  document.getElementById('startScreen').classList.remove('hidden');
}

function esc(s){
  const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;
}

document.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    const nb = document.getElementById('nextBtn');
    if(nb && !nb.disabled) nb.click();
  }
  if(!answered && e.key >= '1' && e.key <= '4'){
    const idx = parseInt(e.key) - 1;
    const btns = document.querySelectorAll('.opt-btn');
    if(btns[idx]) btns[idx].click();
  }
});

loadData();
</script>
</body>
</html>
